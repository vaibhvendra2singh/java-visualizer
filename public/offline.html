<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Java Code Visualizer</title>
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --border: rgba(63, 63, 70, 0.4);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #863bff;
    }

    /* Light mode support matching App.tsx toggles */
    :global(.light-mode) {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.8);
      --border: rgba(226, 232, 240, 0.8);
      --text: #0f172a;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    .offline-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    /* Dynamic accent line */
    .offline-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .icon-container {
      margin-bottom: 24px;
      display: inline-flex;
      padding: 16px;
      border-radius: 50%;
      background: rgba(134, 59, 255, 0.1);
      color: var(--accent);
    }

    .icon-container svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 24px;
      background-color: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 8px #ef4444;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-container">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.268 7.268a9 9 0 0110.464 0M7.5 10.5a6 6 0 018.8 0M12 17h.01" />
      </svg>
    </div>
    <h1>No Connection</h1>
    <p>
      Java Code Visualizer is offline. Please check your internet connection. Cached code execution runs will continue to work.
    </p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="status-badge">
      <span class="status-dot"></span>
      Offline Mode
    </div>
  </div>

  <script>
    // Detect theme class on body if configured
    if (localStorage.getItem('theme') === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.documentElement.classList.add('light-mode');
    }

    // Auto reconnect detection
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
